  header, main, footer{ position:relative; z-index:1; }
  .wrap{max-width:1400px;margin:0 auto;padding:0 24px;}
  .hidden{display:none !important;}

  /* ---------- LOGIN ---------- */
  #loginScreen{
    min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; z-index:2;
  }
  .login-card{
    width:380px; background:var(--panel); border:1px solid var(--border-soft); border-radius:16px;
    padding:34px 32px; box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .login-logo{width:64px;height:64px;background:#fff;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;padding:8px;}
  .login-logo img{width:100%;height:100%;object-fit:contain;}
  .login-card h2{text-align:center;margin:0 0 4px;font-size:18px;color:#fff;}
  .login-card .sub{text-align:center;color:var(--text-faint);font-size:12.5px;margin-bottom:24px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;}
  .field input, .field select, .field textarea{
    width:100%; background:var(--panel-2); border:1px solid var(--border); color:var(--text);
    padding:10px 12px; border-radius:8px; font-size:13.5px; outline:none; font-family:inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--accent);}
  .login-btn{
    width:100%; padding:11px; border:none; border-radius:9px; background:linear-gradient(135deg,var(--accent),#d9800a);
    color:#1a1200; font-weight:800; font-size:14px; cursor:pointer; margin-top:6px;
  }
  .login-btn:hover{filter:brightness(1.06);}
  .login-error{background:rgba(244,88,110,0.12);border:1px solid rgba(244,88,110,0.35);color:var(--red);
    padding:9px 12px;border-radius:8px;font-size:12.5px;margin-bottom:14px;display:none;}
  .login-error.show{display:block;}
  .login-hint{margin-top:16px;text-align:center;font-size:11px;color:var(--text-faint);line-height:1.6;}

  /* ---------- HEADER ---------- */
  header{
    border-bottom:1px solid var(--border-soft);
    background:linear-gradient(180deg, rgba(17,26,44,0.9), rgba(17,26,44,0.4));
    backdrop-filter:blur(6px); padding:16px 0; position:sticky; top:0; z-index:50;
  }
  .header-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:14px;}
  .logo{width:48px;height:48px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 18px rgba(0,0,0,0.25);flex-shrink:0;padding:6px;}
  .logo img{width:100%;height:100%;object-fit:contain;}
  .brand-text .tag{display:inline-block;background:rgba(245,148,12,0.14);color:var(--accent-2);
    font-size:10px;font-weight:700;letter-spacing:.08em;padding:2px 7px;border-radius:5px;margin-bottom:4px;}
  .brand-text h1{margin:0;font-size:17px;font-weight:800;color:#fff;}
  .brand-text p{margin:1px 0 0;font-size:11.5px;color:var(--text-dim);}
  .header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .btn{border:1px solid var(--border);background:var(--panel-2);color:var(--text);padding:8px 13px;border-radius:9px;
    font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap;}
  .btn:hover{border-color:var(--accent);color:var(--accent-2);}
  .btn.primary{background:linear-gradient(135deg,var(--accent),#d9800a);border:none;color:#1a1200;}
  .btn.primary:hover{filter:brightness(1.08);color:#1a1200;}
  .btn.danger:hover{border-color:var(--red);color:var(--red);}
  .btn.sm{padding:6px 10px;font-size:11.5px;}
  .lang-toggle{display:flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;background:var(--panel-2);}
  .lang-toggle button{border:none;background:transparent;color:var(--text-dim);padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;}
  .lang-toggle button.active{background:var(--accent);color:#1a1200;}
  .user-pill{display:flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--border);
    padding:6px 12px 6px 6px;border-radius:20px;font-size:12px;}
  .user-pill .av{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#1a1200;display:flex;
    align-items:center;justify-content:center;font-weight:800;font-size:11px;}
  #fileInput{display:none;}

  .building-bar{
    display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap;
    background:var(--panel-2);border:1px solid var(--border-soft);border-radius:12px;padding:10px 14px;
  }
  .building-bar select{background:var(--panel);border:1px solid var(--border);color:#fff;padding:8px 12px;
    border-radius:8px;font-size:13px;font-weight:700;min-width:200px;}
  .building-meta{display:flex;gap:18px;flex-wrap:wrap;flex:1;font-size:11.5px;color:var(--text-dim);}
  .building-meta b{color:#fff;}

  main{padding-top:24px;padding-bottom:60px;}
  .section-title{display:flex;align-items:center;gap:9px;margin:30px 0 14px;}
  .section-title h2{font-size:15px;margin:0;font-weight:700;color:#fff;}
  .section-title .bar{width:4px;height:16px;background:var(--accent);border-radius:2px;flex-shrink:0;}

  .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .kpi{background:var(--panel);border:1px solid var(--border-soft);border-radius:var(--radius);padding:16px 16px 14px;position:relative;overflow:hidden;}
  .kpi::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--accent));}
  .kpi .klabel{font-size:11.5px;color:var(--text-dim);margin-bottom:9px;font-weight:600;}
  .kpi .kval{font-size:27px;font-weight:800;color:#fff;display:flex;align-items:baseline;gap:7px;}
  .kpi .kval small{font-size:13px;font-weight:700;color:var(--kc,var(--accent));}
  .kpi .ksub{margin-top:7px;font-size:11px;color:var(--text-faint);display:flex;align-items:center;gap:5px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--kc,var(--accent));flex-shrink:0;}

  .chart-row{display:grid;grid-template-columns:1.15fr 1fr;gap:16px;align-items:stretch;}
  .panel{background:var(--panel);border:1px solid var(--border-soft);border-radius:var(--radius);padding:20px 22px;}
  .panel h3{margin:0 0 4px;font-size:14px;font-weight:700;color:#fff;}
  .panel .sub{font-size:11.5px;color:var(--text-faint);margin-bottom:16px;}

  .barlist .brow{display:grid;grid-template-columns:96px 1fr 100px;align-items:center;gap:12px;margin-bottom:13px;}
  html[dir="rtl"] .barlist .brow{grid-template-columns:100px 1fr 96px;}
  .barlist .blabel{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .barlist .btrack{height:15px;background:var(--panel-2);border-radius:8px;overflow:hidden;display:flex;border:1px solid var(--border-soft);}
  .barlist .bfill-ok{height:100%;background:linear-gradient(90deg,var(--green-dim),var(--green));}
  .barlist .bfill-still{height:100%;background:linear-gradient(90deg,#8a4d0a,var(--amber));}
  .barlist .bnum{font-size:11.5px;color:var(--text-dim);text-align:right;}
  html[dir="rtl"] .barlist .bnum{text-align:left;}
  .barlist .bnum b{color:#fff;}
  .legend-row{display:flex;gap:16px;margin-top:4px;flex-wrap:wrap;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);}
  .legend-sw{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  .donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center;}
  .donut-legend{display:grid;gap:8px;flex:1;min-width:160px;}
  .dl-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;}
  .dl-left{display:flex;align-items:center;gap:8px;color:var(--text-dim);}
  .dl-sw{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  .dl-right{color:#fff;font-weight:700;}

  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .panel p{font-size:12.8px;line-height:1.7;color:var(--text-dim);margin:0 0 12px;}
  .panel p b{color:#fff;}
  .cm-list{list-style:none;margin:0;padding:0;display:grid;gap:11px;}
  .cm-list li{font-size:12.3px;line-height:1.6;color:var(--text-dim);padding-left:16px;position:relative;}
  html[dir="rtl"] .cm-list li{padding-left:0;padding-right:16px;}
  .cm-list li::before{content:"";position:absolute;left:0;top:6px;width:6px;height:6px;border-radius:50%;background:var(--accent);}
  html[dir="rtl"] .cm-list li::before{left:auto;right:0;}
  .cm-list li b{color:#fff;}

  .ledger-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{border:1px solid var(--border);background:var(--panel-2);color:var(--text-dim);padding:6px 12px;border-radius:20px;
    font-size:11.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s;}
  .chip .n{background:rgba(255,255,255,0.08);padding:1px 6px;border-radius:10px;font-size:10px;}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#1a1200;}
  .chip.active .n{background:rgba(0,0,0,0.18);color:#1a1200;}
  .head-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .searchbox{position:relative;}
  .searchbox input{background:var(--panel-2);border:1px solid var(--border);color:var(--text);
    padding:8px 13px 8px 32px;border-radius:9px;font-size:12px;width:220px;outline:none;}
  html[dir="rtl"] .searchbox input{padding:8px 32px 8px 13px;text-align:right;}
  .searchbox input:focus{border-color:var(--accent);}
  .searchbox svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--text-faint);}
  html[dir="rtl"] .searchbox svg{left:auto;right:10px;}

  .table-wrap{border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden;background:var(--panel);}
  .table-scroll{max-height:540px;overflow-y:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead th{position:sticky;top:0;background:#131d33;color:var(--text-faint);text-align:left;font-size:10px;
    letter-spacing:.05em;text-transform:uppercase;padding:11px 14px;border-bottom:1px solid var(--border-soft);z-index:2;}
  html[dir="rtl"] thead th{text-align:right;}
  tbody td{padding:9px 14px;border-bottom:1px solid var(--border-soft);color:var(--text-dim);}
  tbody tr:hover{background:rgba(245,148,12,0.045);}
  tbody tr:last-child td{border-bottom:none;}
  .no-cell{color:var(--text-faint);font-variant-numeric:tabular-nums;}
  .loc-cell{color:#fff;font-weight:700;font-variant-numeric:tabular-nums;}
  .badge{display:inline-block;padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;}
  .b-civil{background:rgba(199,208,224,0.14);color:var(--grey);}
  .b-plumb{background:rgba(61,139,242,0.16);color:#7fb1ff;}
  .b-elect{background:rgba(245,166,35,0.16);color:var(--amber);}
  .b-hvac{background:rgba(244,88,110,0.16);color:#ff8b9c;}
  .b-lift{background:rgba(167,139,250,0.18);color:var(--purple);}
  .status-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;}
  .s-ok{background:rgba(40,199,117,0.14);color:var(--green);}
  .s-maint{background:rgba(245,166,35,0.14);color:var(--amber);}
  .s-spr{background:rgba(244,88,110,0.14);color:var(--red);}
  .s-pending{background:rgba(143,160,189,0.14);color:var(--text-dim);}
  .row-actions{display:flex;gap:6px;}
  .icon-btn{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:var(--panel-2);
    color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent-2);}
  .icon-btn.del:hover{border-color:var(--red);color:var(--red);}
  .icon-btn svg{width:13px;height:13px;}
  .empty-row td{text-align:center;padding:36px;color:var(--text-faint);}

  .import-banner{display:none;align-items:center;gap:10px;margin-top:14px;padding:10px 15px;border-radius:10px;
    font-size:12px;font-weight:600;border:1px solid var(--border-soft);}
  .import-banner.show{display:flex;}
  .import-banner.ok{background:rgba(40,199,117,0.10);border-color:rgba(40,199,117,0.35);color:var(--green);}
  .import-banner.err{background:rgba(244,88,110,0.10);border-color:rgba(244,88,110,0.35);color:var(--red);}
  .import-banner.busy{background:rgba(245,148,12,0.10);border-color:rgba(245,148,12,0.35);color:var(--accent-2);}
  .import-banner button{margin-inline-start:auto;background:transparent;border:none;color:inherit;cursor:pointer;font-size:11.5px;font-weight:700;text-decoration:underline;}

  footer{text-align:center;color:var(--text-faint);font-size:11px;margin-top:30px;padding-top:18px;border-top:1px solid var(--border-soft);}

  /* ---------- MODALS ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(4,7,14,0.72);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal-card{width:100%;max-width:460px;background:var(--panel);border:1px solid var(--border-soft);
    border-radius:16px;padding:26px;max-height:88vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,0.5);}
  .modal-card.wide{max-width:640px;}
  .modal-card h3{margin:0 0 4px;font-size:16px;color:#fff;}
  .modal-card .msub{font-size:11.5px;color:var(--text-faint);margin-bottom:18px;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .user-row, .building-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 12px;border:1px solid var(--border-soft);border-radius:9px;margin-bottom:8px;background:var(--panel-2);}
  .user-row .uname{font-weight:700;color:#fff;font-size:13px;}
  .user-row .urole{font-size:10.5px;color:var(--text-faint);}
  .divider{height:1px;background:var(--border-soft);margin:18px 0;}

  @media(max-width:1000px){
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
    .chart-row,.two-col,.grid-2{grid-template-columns:1fr;}
  }
  @media print{
    header,.btn,.filters,.searchbox,.lang-toggle,.row-actions,.building-bar,.import-banner{display:none;}
    .table-scroll{max-height:none;overflow:visible;}
    body{background:#fff;color:#000;}
  }
</style>
</head>

const KNOWN_DEPTS = {
  CIVIL:{en:'Civil', ar:'مدني', color:'#c7d0e0', badge:'b-civil'},
  PLUMB:{en:'Plumbing', ar:'سباكة', color:'#3d8bf2', badge:'b-plumb'},
  ELECT:{en:'Electrical', ar:'كهرباء', color:'#f5a623', badge:'b-elect'},
  HVAC:{en:'HVAC', ar:'تكييف', color:'#f4586e', badge:'b-hvac'},
  LIFT:{en:'Lifts', ar:'مصاعد', color:'#a78bfa', badge:'b-lift'}
};
const EXTRA_PALETTE = ['#34d3b5','#f472b6','#84cc16','#38bdf8','#e879f9','#facc15'];
const DEPT_SYNONYMS = {
  CIVIL:'CIVIL', ARCHITECTURAL:'CIVIL', ARCH:'CIVIL',
  PLUMB:'PLUMB', PLUMBING:'PLUMB',
  ELECT:'ELECT', ELECTRICAL:'ELECT', ELEC:'ELECT',
  HVAC:'HVAC', AC:'HVAC', MECH:'HVAC', MECHANICAL:'HVAC',
  LIFT:'LIFT', LIFTS:'LIFT', ELEVATOR:'LIFT', ELEVATORS:'LIFT'
};
function normalizeDeptCode(raw){
  if(!raw) return 'OTHER';
  const up = String(raw).trim().toUpperCase().replace(/[^A-Z]/g,'');
  return DEPT_SYNONYMS[up] || (up || 'OTHER');
}
function titleCase(s){ return String(s).toLowerCase().replace(/\b\w/g, c=>c.toUpperCase()); }

function getBuilding(id){ return BUILDINGS.find(b=>b.id===id); }
function getCurrentBuilding(){ return getBuilding(currentBuildingId); }

function buildDeptMeta(){
  const tickets = getCurrentBuilding().tickets;
  const codes = Array.from(new Set(tickets.map(d=>d.dept)));
  const counts = {};
  codes.forEach(c=>counts[c]=tickets.filter(d=>d.dept===c).length);
  codes.sort((a,b)=>counts[b]-counts[a]);
  DEPT_META = {};
  let extraIdx = 0;
  codes.forEach(code=>{
    if(KNOWN_DEPTS[code]){ DEPT_META[code] = KNOWN_DEPTS[code]; }
    else{
      const color = EXTRA_PALETTE[extraIdx % EXTRA_PALETTE.length]; extraIdx++;
      DEPT_META[code] = {en:titleCase(code), ar:titleCase(code), color:color, badge:'b-civil'};
    }
  });
  DEPT_ORDER = codes;
}

/* ================= AUTH ================= */
function doLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const found = USERS.find(x=>x.username===u && x.password===p);
  const err = document.getElementById('loginError');
  if(!found){
    err.textContent = t('loginError');
    err.classList.add('show');
    return;
  }
  err.classList.remove('show');
  currentUser = found;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('userAvatar').textContent = currentUser.username.slice(0,2).toUpperCase();
  document.getElementById('userNameLabel').textContent = currentUser.username;
  renderBuildingSelect();
  renderAll();
}
function doLogout(){
  currentUser = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('loginUser').value='';
  document.getElementById('loginPass').value='';
}
document.addEventListener('keydown', (e)=>{
  if(e.key==='Enter'){
    if(!document.getElementById('loginScreen').classList.contains('hidden')){ doLogin(); }
  }
});

function addUser(){
  const u = document.getElementById('fNewUsername').value.trim();
  const p = document.getElementById('fNewPassword').value;
  if(!u || !p){ alert(t('fillBothFields')); return; }
  if(USERS.some(x=>x.username===u)){ alert(t('userExists')); return; }
  USERS.push({username:u, password:p, role:'user'});
  document.getElementById('fNewUsername').value='';
  document.getElementById('fNewPassword').value='';
  renderUsersList();
}
function removeUser(idx){
  if(USERS.length<=1){ alert(t('cannotDeleteLastUser')); return; }
  if(!confirm(t('confirmDeleteUser'))) return;
  USERS.splice(idx,1);
  renderUsersList();
}

function openBuildingModal(id){
  editingBuildingId = id;
  const title = document.getElementById('buildingModalTitle');
  title.textContent = id ? t('editBuilding') : t('addBuilding');
  if(id){
    const b = getBuilding(id);
    document.getElementById('fBuildingName').value = b.name;

  }
  openModal('buildingModalOverlay');

function saveBuildingFromModal(){
  const name = document.getElementById('fBuildingName').value.trim();
  const sm = document.getElementById('fSiteManager').value.trim();
  const be = document.getElementById('fBuildingEngineer').value.trim();
  const period = document.getElementById('fPeriod').value.trim();
  if(!name){ alert(t('fieldBuildingName')); return; }
  if(editingBuildingId){
    const b = getBuilding(editingBuildingId);
    b.name=name; b.siteManager=sm; b.buildingEngineer=be; b.period=period;
  } else {
    const id = 'b'+Date.now();
    BUILDINGS.push({id, name, siteManager:sm, buildingEngineer:be, period, nextNo:1, tickets:[]});
    currentBuildingId = id;
  }
  closeModal('buildingModalOverlay');
  renderBuildingSelect();
  renderAll();
}
function deleteBuilding(){
  if(BUILDINGS.length<=1){ alert(t('cannotDeleteLastBuilding')); return; }
  if(!confirm(t('confirmDeleteBuilding'))) return;
  BUILDINGS = BUILDINGS.filter(b=>b.id!==currentBuildingId);
  currentBuildingId = BUILDINGS[0].id;
  renderBuildingSelect();
  renderAll();
}

/* ================= TICKET STATUS HELPERS ================= */
function statusFormToData(formVal){
  if(formVal==='OK') return {status:'OK', note:''};
  if(formVal==='MAINT') return {status:'STILL', note:'Under Maintenance'};
  if(formVal==='SPR') return {status:'STILL', note:'Spr'};
  return {status:'PENDING', note:''};
}
function dataToStatusForm(d){
  if(d.status==='OK') return 'OK';
  if(d.status==='PENDING') return 'PENDING';
  return d.note==='Spr' ? 'SPR' : 'MAINT';
}

/* ================= TICKET CRUD ================= */
function openTicketModal(id){
  editingTicketId = id;
  const title = document.getElementById('ticketModalTitle');
  title.textContent = id ? t('editTicket') : t('addTicket');
  document.getElementById('deptSuggestions').innerHTML = Object.keys(KNOWN_DEPTS).map(k=>`<option value="${k}">`).join('');
  if(id){
    const b = getCurrentBuilding();
    const d = b.tickets.find(x=>x.id===id);
    document.getElementById('fTicketDept').value = d.dept;
    document.getElementById('fTicketLoc').value = d.loc;
    document.getElementById('fTicketNotice').value = d.notice;
    document.getElementById('fTicketStatus').value = dataToStatusForm(d);
  } else {
    document.getElementById('fTicketDept').value='';
    document.getElementById('fTicketLoc').value='';
    document.getElementById('fTicketNotice').value='';
    document.getElementById('fTicketStatus').value='OK';
  }
  openModal('ticketModalOverlay');
}
function saveTicketFromModal(){
  const b = getCurrentBuilding();
  if(!b){ alert(t('selectBuildingFirst')); return; }
  const deptRaw = document.getElementById('fTicketDept').value.trim();
  const loc = document.getElementById('fTicketLoc').value.trim();
  const notice = document.getElementById('fTicketNotice').value.trim();
  const statusForm = document.getElementById('fTicketStatus').value;
  if(!deptRaw || !loc || !notice){ alert(t('fillTicketFields')); return; }
  const dept = normalizeDeptCode(deptRaw);
  const {status, note} = statusFormToData(statusForm);
  if(editingTicketId){
    const d = b.tickets.find(x=>x.id===editingTicketId);
    d.dept=dept; d.loc=loc; d.notice=titleCase(notice); d.status=status; d.note=note;
  } else {
    b.tickets.push({id:'t'+Date.now(), no:b.nextNo++, dept, loc, notice:titleCase(notice), status, note});
  }
  closeModal('ticketModalOverlay');
  renderAll();
}
function deleteTicket(id){
  if(!confirm(t('confirmDeleteTicket'))) return;
  const b = getCurrentBuilding();
  b.tickets = b.tickets.filter(x=>x.id!==id);
  renderAll();
}

/* ================= STATS & RENDER ================= */
function computeStats(){
  buildDeptMeta();
  const tickets = getCurrentBuilding().tickets;
  stats.total = tickets.length;
  stats.okCount = tickets.filter(d=>d.status==='OK').length;
  stats.maintCount = tickets.filter(d=>d.status==='STILL' && d.note==='Under Maintenance').length;
  stats.sprCount = tickets.filter(d=>d.status==='STILL' && d.note==='Spr').length;
  stats.pendingCount = tickets.filter(d=>d.status==='PENDING').length;
  stats.dept = {};
  DEPT_ORDER.forEach(d=>stats.dept[d]={ok:0,still:0,total:0});
  tickets.forEach(d=>{
    if(!stats.dept[d.dept]) return;
    stats.dept[d.dept].total++;
    if(d.status==='OK') stats.dept[d.dept].ok++; else stats.dept[d.dept].still++;
  });
}

    const key = el.getAttribute('data-t');
    if(STR[LANG][key] !== undefined) el.textContent = STR[LANG][key];

  const si = document.getElementById('searchInput'); if(si) si.placeholder = t('searchPlaceholder');
  const ft = document.getElementById('footerText'); if(ft) ft.textContent = t('footer');
}

function renderKpis(){
  const kpis = [
    {label:t('kpiTotal'), value:stats.total, sub:t('kpiTotalSub'), color:'var(--accent)'},
    {label:t('kpiOk'), value:stats.okCount, pct: stats.total? (stats.okCount/stats.total*100).toFixed(1)+'%':'0%', sub:t('kpiOkSub'), color:'var(--green)'},
    {label:t('kpiMaint'), value:stats.maintCount, pct: stats.total? (stats.maintCount/stats.total*100).toFixed(1)+'%':'0%', sub:t('kpiMaintSub'), color:'var(--amber)'},
    {label:t('kpiSpr'), value:stats.sprCount, pct: stats.total? (stats.sprCount/stats.total*100).toFixed(1)+'%':'0%', sub:t('kpiSprSub'), color:'var(--red)'},
    {label:t('kpiPending'), value:stats.pendingCount, pct: stats.total? (stats.pendingCount/stats.total*100).toFixed(1)+'%':'0%', sub:t('kpiPendingSub'), color:'var(--purple)'}
  ];
  document.getElementById('kpiGrid').innerHTML = kpis.map(k=>`
    <div class="kpi" style="--kc:${k.color}">
      <div class="klabel">${k.label}</div>
      <div class="kval">${k.value}${k.pct?`<small>${k.pct}</small>`:''}</div>
      <div class="ksub"><span class="dot"></span>${k.sub}</div>
    </div>`).join('');
}

function renderBarList(){
  const maxTotal = Math.max(1, ...DEPT_ORDER.map(d=>stats.dept[d].total));
  const ticketsLabel = LANG==='ar' ? 'بلاغ' : 'tickets';
  document.getElementById('barList').innerHTML = DEPT_ORDER.map(d=>{
    const s = stats.dept[d];
    const okPct = s.total? (s.ok/maxTotal*100):0;
    const stillPct = s.total? (s.still/maxTotal*100):0;
    return `<div class="brow">
      <div class="blabel">${deptLabel(d)}</div>
      <div class="btrack"><div class="bfill-ok" style="width:${okPct}%"></div><div class="bfill-still" style="width:${stillPct}%"></div></div>
      <div class="bnum"><b>${s.total}</b> ${ticketsLabel}</div>
    </div>`;
  }).join('') || `<div style="color:var(--text-faint);font-size:12.5px;">—</div>`;
}

function renderDonut(){
  const totalD = DEPT_ORDER.reduce((a,d)=>a+stats.dept[d].total,0) || 1;
  const cx=90, cy=90, r=68, sw=26;
  let angle = -90;
  const circ = 2*Math.PI*r;
  let svg = '';
  DEPT_ORDER.forEach(d=>{
    const val = stats.dept[d].total;
    const frac = val/totalD;
    const dash = frac*circ;
    svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${DEPT_META[d].color}" stroke-width="${sw}"
      stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-((angle+90)/360*circ)}"
      transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
    angle += frac*360;
  });
  const ticketsLabel = LANG==='ar' ? 'بلاغ' : 'tickets';
  svg += `<text x="${cx}" y="${cy-4}" text-anchor="middle" fill="#fff" font-size="24" font-weight="800" font-family="Segoe UI">${DEPT_ORDER.length?totalD:0}</text>`;
  svg += `<text x="${cx}" y="${cy+16}" text-anchor="middle" fill="#8fa0bd" font-size="10.5" font-family="Segoe UI">${ticketsLabel}</text>`;
  document.getElementById('donutSvg').innerHTML = svg;
  document.getElementById('donutLegend').innerHTML = DEPT_ORDER.map(d=>{
    const val = stats.dept[d].total;
    const pct = (val/totalD*100).toFixed(1);
    return `<div class="dl-row">
      <div class="dl-left"><span class="dl-sw" style="background:${DEPT_META[d].color}"></span>${deptLabel(d)}</div>
      <div class="dl-right">${val} <span style="color:var(--text-faint);font-weight:600;">(${pct}%)</span></div>
    </div>`;
  }).join('') || `<div style="color:var(--text-faint);font-size:12.5px;">—</div>`;
}

const CATS = [
  {key:'lighting', test:/lamp|light|spot/i, en:'Lighting / lamp faults', ar:'أعطال الإضاءة / وميض المصابيح'},
  {key:'basin', test:/basin/i, en:'Basin blockages', ar:'انسداد المغاسل'},
  {key:'handspray', test:/hand spray|siphon|bidet/i, en:'Hand-spray / bidet fittings', ar:'تركيبات رشاش اليد / الشطاف'},
  {key:'flashtank', test:/flash tank/i, en:'Flush-tank faults', ar:'أعطال خزان الطرد'},
  {key:'bathroom', test:/bathroom.*block/i, en:'Bathroom blockages', ar:'انسداد دورات المياه'},
  {key:'soapbox', test:/soap box/i, en:'Soap-box leaks', ar:'تسريبات علبة الصابون'},
  {key:'tissue', test:/tissue/i, en:'Tissue-holder repairs', ar:'إصلاحات حامل المناديل'},
  {key:'door', test:/door/i, en:'Door repairs', ar:'إصلاحات الأبواب'},
  {key:'marble', test:/marble/i, en:'Marble repairs', ar:'إصلاحات الرخام'},
  {key:'hvac', test:/\bac\b|cold|hot/i, en:'HVAC (AC hot/cold)', ar:'أعطال التكييف (حار/بارد)'},
  {key:'socket', test:/socket/i, en:'Socket faults', ar:'أعطال المقابس'},
  {key:'wall', test:/wall/i, en:'Wall cracks', ar:'تصدعات الجدران'}
];
function classify(notice){
  for(const c of CATS){ if(c.test.test(notice)) return c; }
  return {key:'other', en:'Other', ar:'أخرى'};
}

function renderSummary(){
  const s = stats;
  const tickets = getCurrentBuilding().tickets;
  const okPct = s.total? (s.okCount/s.total*100).toFixed(1):'0.0';
  const topDepts = DEPT_ORDER.slice(0,3);
  const catCounts = {};
  tickets.forEach(d=>{ const c = classify(d.notice); catCounts[c.key] = (catCounts[c.key]||0)+1; });
  const catList = Object.keys(catCounts).map(k=>({key:k, count:catCounts[k], meta:(CATS.find(c=>c.key===k)||{en:'Other',ar:'أخرى'})}))
    .sort((a,b)=>b.count-a.count);
  const top5 = catList.slice(0,5);

  if(s.total===0){
    document.getElementById('execSummaryBody').innerHTML = `<p>${LANG==='ar' ? 'لا توجد بلاغات مسجلة لهذا المبنى بعد.' : 'No tickets logged for this building yet.'}</p>`;
    document.getElementById('countermeasuresBody').innerHTML = '';
    return;
  }

  if(LANG==='en'){
    let p1 = `<p>This report covers <b>${s.total} maintenance tickets</b> logged for <b>${getCurrentBuilding().name}</b>, of which <b>${s.okCount} (${okPct}%)</b> were closed and tested successfully.</p>`;
    let deptSentences = topDepts.map(d=>{
      const st = s.dept[d]; const pct = s.total? (st.total/s.total*100).toFixed(1):'0.0';
      return `${deptLabel(d)} <b>${st.total} (${pct}%)</b>`;
    }).join(', ');
    let p2 = topDepts.length ? `<p>By trade: ${deptSentences}.</p>` : '';
    let p3 = `<p>Currently, <b>${s.maintCount} tickets</b> remain under active maintenance and <b>${s.sprCount} tickets</b> are held awaiting spare-parts dispatch (SPR)${s.pendingCount?`, with a further <b>${s.pendingCount} ticket(s)</b> needing verification`:''}.</p>`;
    document.getElementById('execSummaryBody').innerHTML = p1 + p2 + p3;
    document.getElementById('countermeasuresBody').innerHTML = top5.map(c=>{
      const pct = s.total? (c.count/s.total*100).toFixed(1):'0.0';
      return `<li><b>${c.meta.en} (${c.count} tickets, ${pct}%):</b> one of the most frequent fault categories — recommend a targeted root-cause inspection and a stocked-parts plan for this fixture type.</li>`;
    }).join('') + (s.sprCount ? `<li><b>Awaiting Spare Parts (${s.sprCount} tickets):</b> recommend pre-stocking the most common failing components to shorten lead time.</li>` : '')
      + (s.pendingCount ? `<li><b>Unverified tickets (${s.pendingCount}):</b> recommend the relevant subcontractor confirm resolution before next cycle.</li>` : '');
  } else {
    let p1 = `<p>يغطي هذا التقرير <b>${s.total} بلاغ صيانة</b> مسجلة لمبنى <b>${getCurrentBuilding().name}</b>، تم إغلاق واختبار <b>${s.okCount} (${okPct}%)</b> منها بنجاح.</p>`;
    let deptSentences = topDepts.map(d=>{
      const st = s.dept[d]; const pct = s.total? (st.total/s.total*100).toFixed(1):'0.0';
      return `${deptLabel(d)} <b>${st.total} (${pct}%)</b>`;
    }).join('، ');
    let p2 = topDepts.length ? `<p>حسب التخصص: ${deptSentences}.</p>` : '';
    let p3 = `<p>حاليًا، ما زال <b>${s.maintCount} بلاغًا</b> تحت أعمال صيانة نشطة، وينتظر <b>${s.sprCount} بلاغًا</b> توريد قطع غيار (SPR)${s.pendingCount?`، مع <b>${s.pendingCount} بلاغ إضافي</b> يحتاج تأكيدًا`:''}.</p>`;
    document.getElementById('execSummaryBody').innerHTML = p1 + p2 + p3;
    document.getElementById('countermeasuresBody').innerHTML = top5.map(c=>{
      const pct = s.total? (c.count/s.total*100).toFixed(1):'0.0';
      return `<li><b>${c.meta.ar} (${c.count} بلاغًا، ${pct}%):</b> من أكثر فئات الأعطال تكرارًا — يوصى بفحص جذري مستهدف وخطة تخزين قطع غيار لهذا النوع من التركيبات.</li>`;
    }).join('') + (s.sprCount ? `<li><b>بانتظار قطع الغيار (${s.sprCount} بلاغًا):</b> يوصى بالتخزين المسبق للمكونات الأكثر عطلاً لتقليل مدة الانتظار.</li>` : '')
      + (s.pendingCount ? `<li><b>بلاغات غير مؤكدة (${s.pendingCount}):</b> يوصى بأن يؤكد المقاول المعني حل المشكلة قبل الدورة القادمة.</li>` : '');
  }
}

function filterDefs(){
  const defs = [{key:'ALL', label:t('filterAll'), count:stats.total}];
  DEPT_ORDER.forEach(d=>{ defs.push({key:d, label:deptLabel(d), count:stats.dept[d].total}); });
  defs.push({key:'STILL_MAINT', label:t('filterMaint'), count:stats.maintCount});
  defs.push({key:'STILL_SPR', label:t('filterSpr'), count:stats.sprCount});
  return defs;
}

  `).join('');

function statusPill(d){
  if(d.status==='OK') return `<span class="status-pill s-ok">● ${t('statusCompleted')}</span>`;
  if(d.status==='PENDING') return `<span class="status-pill s-pending">● ${t('statusVerify')}</span>`;
  if(d.note==='Spr') return `<span class="status-pill s-spr">● ${t('statusSpr')}</span>`;
  return `<span class="status-pill s-maint">● ${t('statusMaint')}</span>`;
}
function matchesFilter(d){
  if(activeFilter==='ALL') return true;
  if(activeFilter==='STILL_MAINT') return d.status==='STILL' && d.note==='Under Maintenance';
  if(activeFilter==='STILL_SPR') return d.status==='STILL' && d.note==='Spr';
  return d.dept===activeFilter;
}

/* ================= EXPORT CSV ================= */
function exportCSV(){
  const b = getCurrentBuilding();
  const term = searchTerm.trim().toLowerCase();
  const rows = b.tickets.filter(d=>{
    if(!matchesFilter(d)) return false;
    if(!term) return true;
    return d.loc.toLowerCase().includes(term) || noticeText(d).toLowerCase().includes(term) || deptLabel(d.dept).toLowerCase().includes(term);
  });
  const cols = t('csvCols');
  let csv = cols.join(',') + '\n';
  rows.forEach(d=>{
    let statusLabel;
    if(d.status==='OK') statusLabel = t('statusCompleted');
    else if(d.status==='PENDING') statusLabel = t('statusVerify');
    else statusLabel = d.note==='Spr' ? t('statusSpr') : t('statusMaint');
    csv += `${d.no},${deptLabel(d.dept)},${d.loc},"${noticeText(d)}",${statusLabel}\n`;
  });
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `AMOS_${b.name.replace(/[^a-z0-9]+/gi,'_')}_${LANG}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

  const a = document.createElement('a');
  a.href = url; a.download = `AMOS_Backup_${new Date().toISOString().slice(0,10)}.json`;

function loadBackupFile(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try{
      const payload = JSON.parse(e.target.result);
      if(!payload.buildings || !payload.users) throw new Error('bad format');
      USERS = payload.users;
      BUILDINGS = payload.buildings;
      currentBuildingId = payload.currentBuildingId || BUILDINGS[0].id;
      renderBuildingSelect();
      renderAll();
      alert(t('loadedBackup'));
    }catch(err){ alert(t('backupError')); }
  };
  reader.readAsText(file);
  evt.target.value='';
}

/* ================= IMPORT: EXCEL / CSV / PDF ================= */
function normStatus(rawStatus, rawNote){
  const s = String(rawStatus||'').trim().toUpperCase();
  const n = String(rawNote||'').trim().toUpperCase();
  if(!s || s==='_' || s==='-' || s==='—'){ return {status:'PENDING', note:''}; }
  if(['OK','DONE','COMPLETE','COMPLETED','CLOSED','YES'].includes(s)){ return {status:'OK', note:''}; }
  if(n.includes('SPR') || n.includes('SPARE')){ return {status:'STILL', note:'Spr'}; }
  return {status:'STILL', note:'Under Maintenance'};
}
function rowsFromSheetArray(aoa){
  const headerKeys = {
    no:/^\s*(no\.?|j\.?o\.?|job\s*order|#)\s*$/i,
    dept:/^\s*(part|dept|department|section)\s*$/i,
    loc:/^\s*(complaints?\s*location|location|loc)\s*$/i,
    notice:/^\s*(notice|complaint|issue|description)\s*$/i,
    status:/^\s*(order\s*status|status)\s*$/i,
    note:/^\s*(note|notes|remarks?)\s*$/i
  };
  let headerRowIdx = -1, colMap = null;
  for(let r=0; r<Math.min(6, aoa.length); r++){
    const row = aoa[r].map(c=>String(c||''));
    const map = {};
    row.forEach((cell,ci)=>{ Object.keys(headerKeys).forEach(k=>{ if(headerKeys[k].test(cell)) map[k]=ci; }); });
    if(map.notice!==undefined && (map.loc!==undefined || map.dept!==undefined)){ headerRowIdx = r; colMap = map; break; }
  }
  const out = [];
  let no = 1;
  const startRow = headerRowIdx>=0 ? headerRowIdx+1 : 0;
  const cm = colMap || {no:0, dept:1, loc:2, notice:3, status:4, note:5};
  for(let r=startRow; r<aoa.length; r++){
    const row = aoa[r];
    if(!row || row.every(c=>c===undefined || c===null || String(c).trim()==='')) continue;
    const rawDept = cm.dept!==undefined ? row[cm.dept] : row[1];
    const rawLoc = cm.loc!==undefined ? row[cm.loc] : row[2];
    const rawNotice = cm.notice!==undefined ? row[cm.notice] : row[3];
    const rawStatus = cm.status!==undefined ? row[cm.status] : row[4];
    const rawNote = cm.note!==undefined ? row[cm.note] : row[5];
    if(!rawNotice || String(rawNotice).trim()==='') continue;
    const {status, note} = normStatus(rawStatus, rawNote);
    out.push({no:no++, dept:normalizeDeptCode(rawDept), loc:String(rawLoc||'').trim()||'—', notice:titleCase(String(rawNotice).trim()), status, note});
  }
  return out;
}
function importExcelFile(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      try{
        const wb = XLSX.read(e.target.result, {type:'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const aoa = XLSX.utils.sheet_to_json(sheet, {header:1, defval:''});
        resolve(rowsFromSheetArray(aoa));
      }catch(err){ reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}
async function importPdfFile(file){
  if(!window.pdfjsLib){ throw new Error('pdf.js not loaded'); }
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;
  let lines = [];
  for(let p=1; p<=pdf.numPages; p++){
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const byY = {};
    content.items.forEach(it=>{
      const y = Math.round(it.transform[5]/2)*2;
      if(!byY[y]) byY[y]=[];
      byY[y].push({x:it.transform[4], str:it.str});
    });
    const ys = Object.keys(byY).map(Number).sort((a,b)=>b-a);
    ys.forEach(y=>{
      const items = byY[y].sort((a,b)=>a.x-b.x);
      const lineText = items.map(i=>i.str).join(' ').replace(/\s+/g,' ').trim();
      if(lineText) lines.push(lineText);
    });
  }
  return rowsFromTextLines(lines);
}
const STATUS_TOKENS = ['OK','STILL','PENDING'];
function rowsFromTextLines(lines){
  const out = [];
  lines.forEach(line=>{
    const tokens = line.split(' ').filter(Boolean);
    if(tokens.length < 4) return;
    if(!/^\d+$/.test(tokens[0])) return;
    const no = parseInt(tokens[0],10);
    const dept = tokens[1];
    const loc = tokens[2];
    const rest = tokens.slice(3);
    let statusIdx = -1;
    for(let i=0;i<rest.length;i++){ if(STATUS_TOKENS.includes(rest[i].toUpperCase())){ statusIdx = i; break; } }
    if(statusIdx === -1) return;
    const noticeWords = rest.slice(0, statusIdx);
    const statusWord = rest[statusIdx].toUpperCase();
    const noteWords = rest.slice(statusIdx+1);
    if(noticeWords.length===0) return;
    const {status, note} = normStatus(statusWord, noteWords.join(' '));
    out.push({no, dept:normalizeDeptCode(dept), loc, notice:titleCase(noticeWords.join(' ')), status, note});
  });
  return out;
}
function showBanner(kind, html){
  const el = document.getElementById('importBanner');
  el.className = 'import-banner show ' + kind;
  el.innerHTML = html;
}
function hideBanner(){ document.getElementById('importBanner').classList.remove('show'); }
async function handleFileSelect(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const b = getCurrentBuilding();
  if(!b){ alert(t('selectBuildingFirst')); evt.target.value=''; return; }
  showBanner('busy', `<span>⏳ ${t('importing')}</span>`);
  const ext = file.name.split('.').pop().toLowerCase();
  try{
    let rows = [];
    if(['xlsx','xls','csv'].includes(ext)){
      rows = await importExcelFile(file);
      if(rows.length===0){ showBanner('err', `<span>⚠ ${t('importEmpty')(file.name)}</span><button onclick="hideBanner()">${t('dismiss')}</button>`); return; }
      rows.forEach(r=>{ r.no = b.nextNo++; r.id = 't'+Date.now()+Math.random().toString(36).slice(2,7); b.tickets.push(r); });
      renderAll();
      showBanner('ok', `<span>✓ ${t('importOkExcel')(rows.length, file.name)}</span><button onclick="hideBanner()">${t('dismiss')}</button>`);
    } else if(ext==='pdf'){
      rows = await importPdfFile(file);
      if(rows.length===0){ showBanner('err', `<span>⚠ ${t('importEmpty')(file.name)}</span><button onclick="hideBanner()">${t('dismiss')}</button>`); return; }
      rows.forEach(r=>{ r.no = b.nextNo++; r.id = 't'+Date.now()+Math.random().toString(36).slice(2,7); b.tickets.push(r); });
      renderAll();
      showBanner('ok', `<span>✓ ${t('importOkPdf')(rows.length, file.name)}</span><button onclick="hideBanner()">${t('dismiss')}</button>`);
    } else {
      showBanner('err', `<span>⚠ ${t('importErr')(file.name)}</span><button onclick="hideBanner()">${t('dismiss')}</button>`);
    }
  }catch(err){
    console.error(err);
    showBanner('err', `<span>⚠ ${t('importErr')(file.name)}</span><button onclick="hideBanner()">${t('dismiss')}</button>`);
  }
  evt.target.value = '';
}
